<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TTS Quick Test</title>
<style>
body{font-family:sans-serif;max-width:560px;margin:40px auto;text-align:center}
button{margin:8px 0;padding:8px 20px;font-size:16px}
select{margin-top:12px}
#log{margin-top:18px;font-size:13px;color:#555;text-align:left;white-space:pre-wrap}
</style>
</head>
<body>
  <h2>🔊 브라우저 TTS 테스트</h2>

  <!-- 음성 목록 드롭다운 -->
  <select id="voiceList"></select><br>

  <textarea id="text" rows="3" style="width:100%;margin-top:12px">
테스트: 음성이 들리면 브라우저 TTS가 정상입니다.
  </textarea><br>

  <button id="playBtn">▶ Speak</button>
  <button id="stopBtn">⏹ Stop</button>

  <div id="log"></div>

<script>
const $list = document.getElementById('voiceList');
const $text = document.getElementById('text');
const $log  = document.getElementById('log');

function log(msg){ $log.textContent += msg + '\n'; }

function loadVoices(){
  const voices = speechSynthesis.getVoices();
  $list.innerHTML = voices.map((v,i)=>
    `<option value="${i}">${v.name}   (${v.lang})${v.default?' – default':''}</option>`
  ).join('');
  log(`🗣  loaded ${voices.length} voices`);
}
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices; // 크롬은 비동기 로드

document.getElementById('playBtn').onclick = () =>{
  const v = speechSynthesis.getVoices()[$list.value||0];
  const u = new SpeechSynthesisUtterance($text.value.trim());
  if(v) u.voice = v;
  u.rate  = 1.0;   // 속도 조절 가능
  u.pitch = 1.0;
  u.onstart = ()=>log('▶️  speak start');
  u.onerror = e  =>log('❌  error: '+e.error);
  u.onend   = ()=>log('✅  finished');
  speechSynthesis.speak(u);
};
document.getElementById('stopBtn').onclick = ()=>speechSynthesis.cancel();
</script>
</body>
</html>
